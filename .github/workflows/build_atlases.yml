name: Build Poster Atlases

on:
  push:
    branches:
      - main
    paths:
      - 'images/**'
      - 'poster_data.json'
      - 'build_atlases.py'
      - '.github/workflows/build_atlases.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow

      - name: Build atlases
        id: build
        run: python build_atlases.py

      - name: Commit and push built assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add built_assets/ README.md
          git diff --cached --exit-code || git commit -m "${{ steps.build.outputs.commit_message }}"
          git push
